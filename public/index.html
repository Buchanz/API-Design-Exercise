<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Management API</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div>
          <p class="eyebrow">MongoDB + Express Demo</p>
          <h1>Task Management API</h1>
          <p class="subtitle">Create, update, complete, and delete tasks from the MongoDB-backed REST API.</p>
        </div>
        <button id="refreshBtn" type="button">Refresh</button>
      </section>

      <section class="panel">
        <h2>Add Task</h2>
        <form id="taskForm" class="task-form">
          <label>
            Title
            <input id="title" name="title" type="text" required maxlength="120" placeholder="Finish API assignment">
          </label>

          <label>
            Description
            <textarea id="description" name="description" rows="3" placeholder="Short task details"></textarea>
          </label>

          <div class="form-grid">
            <label>
              Status
              <select id="status" name="status">
                <option value="todo">To do</option>
                <option value="in_progress">In progress</option>
                <option value="done">Done</option>
              </select>
            </label>

            <label>
              Priority
              <select id="priority" name="priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label>
              Due date
              <input id="dueDate" name="dueDate" type="date">
            </label>
          </div>

          <button type="submit">Create Task</button>
        </form>
      </section>

      <section class="panel">
        <div class="list-header">
          <h2>Tasks</h2>
          <p id="statusMessage" class="status-message">Loading tasks...</p>
        </div>
        <div id="taskList" class="task-list"></div>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
