openapi: 3.0.3
info:
  title: Task Management API
  version: 1.0.0
  description: A simple REST API for creating, reading, updating, and deleting tasks.
servers:
  - url: http://localhost:3000/api/v1
    description: Local Express and MongoDB API
  - url: https://mock.example.com/api/v1
    description: Mock server URL placeholder
paths:
  /tasks:
    get:
      summary: Get all tasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [todo, in_progress, done]
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum: [low, medium, high]
      responses:
        "200":
          description: Tasks returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
    post:
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
  /tasks/{id}:
    get:
      summary: Get a task by ID
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      summary: Update a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Task updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Task"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete a task
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task deleted successfully.
        "404":
          $ref: "#/components/responses/NotFound"
components:
  parameters:
    TaskId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: 6876b4a9c96f2c5d12345671
  schemas:
    Task:
      type: object
      required:
        - id
        - title
        - status
        - priority
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: 6876b4a9c96f2c5d12345671
        title:
          type: string
          example: Finish API design exercise
        description:
          type: string
          example: Create endpoints, sample payloads, and documentation.
        status:
          type: string
          enum: [todo, in_progress, done]
          example: in_progress
        priority:
          type: string
          enum: [low, medium, high]
          example: high
        dueDate:
          type: string
          format: date
          example: "2026-07-16"
        createdAt:
          type: string
          format: date-time
          example: "2026-07-14T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-07-14T10:30:00Z"
    CreateTaskRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Study for database quiz
        description:
          type: string
          example: Review MongoDB collections, documents, and CRUD operations.
        status:
          type: string
          enum: [todo, in_progress, done]
          default: todo
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
        dueDate:
          type: string
          format: date
          example: "2026-07-20"
    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          format: date
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Title is required.
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string
  responses:
    BadRequest:
      description: The request has invalid data
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The task was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
